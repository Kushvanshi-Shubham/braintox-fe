<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    
    <!-- Viewport and Performance -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#9333ea" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1f2937" media="(prefers-color-scheme: dark)" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Braintox - Save, organize, and discover content from across the web. AI-powered tagging, knowledge graph, and social bookmarking." />
    <meta name="keywords" content="content management, bookmarks, knowledge base, collections, organize content, AI tagging" />
    <title>Braintox - Your AI-Powered Knowledge Network</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Braintox" />
    <meta property="og:title" content="Braintox — Your AI-Powered Knowledge Network" />
    <meta property="og:description" content="Save, organize, and discover content from across the web. AI-powered tagging, knowledge graph, and social bookmarking." />
    <meta property="og:url" content="https://braintox.vercel.app" />
    <meta property="og:image" content="https://braintox.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Braintox — Your AI-Powered Knowledge Network" />
    <meta name="twitter:description" content="Save, organize, and discover content from across the web. AI-powered tagging, knowledge graph, and social bookmarking." />
    <meta name="twitter:image" content="https://braintox.vercel.app/og-image.png" />
    
    <!-- Performance Hints -->
    <link rel="preconnect" href="https://platform.twitter.com" crossorigin />
    <link rel="preconnect" href="https://www.instagram.com" crossorigin />
    <link rel="dns-prefetch" href="https://platform.twitter.com" />
    <link rel="dns-prefetch" href="https://www.instagram.com" />
    
    <!-- Social Media Embed Scripts (Async loaded) -->
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <script async src="https://www.instagram.com/embed.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="preconnect" href="https://accounts.google.com" crossorigin />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
